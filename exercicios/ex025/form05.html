<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Lista de compras</h1>
        <form action="cadastro.php" method="get">
            <fieldset>
                <div>
                    <input type="checkbox" name="Ovo" id="iovo">
                    <label for="iovo">Ovo</label>
                    <br>
                    <input type="checkbox" name="Leite" id="ileite">
                    <label for="ileite">Leite</label>
                    <br>
                    <input type="checkbox" name="pao" id="ipao">
                    <label for="ipao">Pão</label>
                </div>
                <p>
                    <input type="submit" value="Enviar">
                    <input type="reset" value="Limpar">
                </p>
                <div>
                    <h2>Crédito ou débito</h2>
                    <input type="radio" name="pagamento" id="icred"> <label for="icred">Crédito</label>
                    <input type="radio" name="pagamento" id="ideb"> <label for="ideb">Débito</label>
                </div>
            </fieldset>
        </form>
</body>
</html>
