<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Meu primeiro formulário</h1>
    <form action="cadastro.javascript" method="post"> <!--Este action serve para enviar o cadastro para a linguagem escolhida. O method vai dizer se o conteúdo vai ser possível visualiza-lo na url do site ou não, o method get mostra o conteúdo, já o post não, apenas vasculhando pelo inspecionar.-->

        <p><label for="iNome">Nome:</label> <!--Este label é importantissimo para os mecanismos de busca do navegador além de facilitar o acesso ao dispositivos móveis. (SEMPRE USAR O LABEL PARA DEFINIR QUAL INPUT ELE PERTENCE).-->

            <input  type="text" name="Nome" id="iNome"></p> <!-- O label precisa do ID do input para ser linkado. -->
        <p><label for="isobrenome">Sobrenome:</label>
            <input type="text" name="sobrenome" id="isobrenome"></p>

        <p><input type="submit" value="Enviar"></p>
    </form> 
</body>
</html>
