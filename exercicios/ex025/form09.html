<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <form action="cadastro.php" method="get">
        <p>
            <label for="irange">Escolha de 1 a 10</label> <br>
            <input type="range" name="range" id="irange" min="1" max="10" oninput="ival.innerHTML = Number (irange.value)" value="1">
            <output id="ival">1</output>
        </p>
        


    </form>
</body>
</html>
