<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {
            background-color: lightgray;
            width: 300px;
            height: 300px;
            border: 10px double darkslategray;
            text-align: center;
            padding: 10px;
            

            margin: 10px;

            outline: 2px dashed gray;
        }
        a {
            background-color: lightgrey;
            border: 2px double darkslategray;
            text-decoration: underline;
            text-decoration-color: darkgoldenrod;
            color: blue;
            padding: 10px;
            font-size: 1.05em;
        }
    </style>
</head>
<body>
    <!--
        Div = Box-level
        Span = Inline-level
    -->
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exmplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a> . Vamos ver como tudo isso funciona.</p>
</body>
</html>
