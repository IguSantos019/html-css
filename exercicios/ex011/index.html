<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>
        Tente abrir as imagens em dispositivos de diferentes tamanhos, ou apenas aumente e diminua o tamanho da aba do navegador
    </p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/Foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/Foto-m.png" type="image/png">
        <img src="Imagens/Foto-g.png" alt="Imagem flexivel">
    </picture>
    <h1>Reproduzindo audios</h1>
    <p>Vamos aprender a reproduzir áudios no HTML5</p>
    <!--MP3, WAV e OGG são formatos de arquivos de áudios-->
    <audio autoplay controls muted>
        <source src="midia/Os-D-da-tira.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
