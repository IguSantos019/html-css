<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio tabela 2</title>
    <style>
        body{
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        table {
            border-collapse: collapse;
        }
        td {
            border: 1px solid black;
            padding: 5px;
            width: 100px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Desafio de tabela com mesclagem de células 2</h1>
    <table>
        <tbody>
            <tr> <!--Primeira linha-->
                <td colspan="4">A</td> <!--Ocupando 4 colunas-->
            
                <td rowspan="4">B</td> <!--Ocupando 4 linhas-->
            </tr>
            <tr> <!--Segunda linha-->
                <td rowspan="4">C</td> <!--Ocupando 4 linhas-->
                <td>D</td>
                <td>E</td>
                <td>F</td>
            </tr>
            <tr> <!--Terceira linha-->
                <td>G</td>
                <td>H</td>
                <td>I</td>
            </tr>
            <tr> <!--Quarta linha-->
                <td>J</td>
                <td>L</td>
                <td>M</td>
            </tr>
            <tr> <!--Quinta linha-->
                <td colspan="4">N</td> <!--Ocupando 4 colunas-->
            </tr>
        </tbody>
    </table>
</body>
</html>
